{% set name = "azure-mgmt-trafficmanager" %}
{% set version = "1.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.zip
  sha256: 35bf1902bf1589d626e35971e5aaa009e884094672b479b798cd1bb8d4f2fdf9
  
build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<37]

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - isodate >=0.6.1,<1.0.0
    - azure-common >=1.1,<2.0
    - azure-mgmt-core>=1.3.2,<2.0.0
    - typing-extensions>=4.3.0  # [py<38]

test:
  imports:
    - azure.mgmt.trafficmanager
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/Azure/azure-sdk-for-python
  summary: Microsoft Azure Traffic Manager Client Library for Python
  license: MIT
  license_family: MIT
  license_file: LICENSE
  description: Microsoft Azure Traffic Manager Client Library for Python
  dev_url: https://github.com/Azure/azure-sdk-for-python
  doc_url: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - tim-werner
